<div class="min-h-dvh bg-stone-50 text-stone-900 antialiased">
  <header class="border-b border-stone-200/80 bg-white/80 backdrop-blur-md">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a routerLink="/" class="text-sm font-semibold tracking-tight text-stone-900">BharatMotors</a>
      <nav class="flex items-center gap-6 text-sm text-stone-600">
        <a routerLink="/" class="transition hover:text-stone-900" routerLinkActive="text-stone-900" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/browse" class="transition hover:text-stone-900" routerLinkActive="text-stone-900">Browse</a>
      </nav>
    </div>
  </header>
  <main>
    <router-outlet />
  </main>
  <app-chat-widget />

  <!-- Global Comparison Panel -->
  <app-car-comparison
    [show]="comparison.isPanelOpen()"
    (close)="comparison.closePanel()"
    (clearAll)="comparison.clear(); comparison.closePanel()"
  />

  <!-- Global Floating Bar -->
  @if (comparison.count() >= 1 && !comparison.isPanelOpen()) {
    <div class="fixed bottom-4 left-1/2 z-[90] -translate-x-1/2 flex items-center gap-3 rounded-full bg-stone-900 px-5 py-3 shadow-xl text-white text-sm font-medium">
      <span class="opacity-80">{{ comparison.count() }} car{{ comparison.count() > 1 ? 's' : '' }} selected</span>
      @if (comparison.count() >= 2) {
        <button type="button" class="rounded-full bg-white text-stone-900 px-4 py-1.5 text-xs font-semibold hover:bg-stone-100 transition whitespace-nowrap" (click)="comparison.openPanel()">Compare Now</button>
      } @else {
        <span class="text-xs opacity-60 whitespace-nowrap">Add 1 more to compare</span>
      }
      <button type="button" class="text-stone-400 hover:text-white transition text-lg leading-none" (click)="comparison.clear(); comparison.closePanel()" title="Clear all">✕</button>
    </div>
  }
</div>
